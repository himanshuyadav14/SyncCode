# Render Blueprint – SyncCode
# https://dashboard.render.com → New → Blueprint
# Is repo ko connect karo, Render automatically is file se services create karega.

services:
  - type: web
    name: synccode
    runtime: node
    region: singapore  # ya apna preferred region (oregon, frankfurt, etc.)

    buildCommand: npm install && npm run build
    startCommand: npm start

    envVars:
      - key: NODE_ENV
        value: production
      # PORT Render khud set karta hai. Baaki env vars (REDIS_URL, PISTON_API_URL,
      # NEXT_PUBLIC_ZEGO_*, SMTP_*) Dashboard → Environment me add karo:
      # REDIS_URL, PISTON_API_URL, NEXT_PUBLIC_ZEGO_APP_ID,
      # NEXT_PUBLIC_ZEGO_SERVER_SECRET, SMTP_* (optional)
